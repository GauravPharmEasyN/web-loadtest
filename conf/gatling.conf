gatling {
  # Heavy CDN / many parallel scenarios: avoid aggressive TCP/TLS/request limits that amplify KO rates.
  socket {
    connectTimeout = 20000
  }
  ssl {
    handshakeTimeout = 20000
  }
  http {
    requestTimeout = 120000
    dns {
      queryTimeout = 15000
      maxQueriesPerResolve = 8
    }
  }
}
